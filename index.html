<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Juegos Suramericanos Santa Fe 2026 VR</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; }
    canvas { display:block; }
    #hud { position:absolute; top:16px; left:50%; transform:translateX(-50%); display:flex; gap:16px; align-items:center; pointer-events:none; }
    #score-box { background:rgba(0,0,0,0.55); border:2px solid #c0186a; color:#fff; font-family:Arial,sans-serif; font-size:18px; font-weight:bold; padding:8px 20px; border-radius:20px; }
    #timer-box { background:rgba(0,0,0,0.55); border:2px solid #7b2d8b; color:#fff; font-family:Arial,sans-serif; font-size:18px; font-weight:bold; padding:8px 20px; border-radius:20px; }
    #info-box { background:rgba(0,0,0,0.45); color:#fff; font-family:Arial,sans-serif; font-size:13px; padding:8px 16px; border-radius:20px; }
    #penalty { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#ff3333; font-family:Arial,sans-serif; font-size:48px; font-weight:bold; text-shadow:0 0 20px #ff0000; opacity:0; pointer-events:none; }
    #finish-screen { display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.72); flex-direction:column; align-items:center; justify-content:center; font-family:Arial,sans-serif; color:#fff; text-align:center; }
    #finish-screen h1 { font-size:42px; margin-bottom:12px; color:#ffb347; }
    #finish-screen .sub { font-size:22px; margin:6px 0; color:#ffccee; }
    #finish-screen .final-score { font-size:52px; font-weight:bold; color:#c0186a; margin:18px 0; }
    #finish-screen button { margin-top:20px; padding:14px 36px; font-size:18px; border:none; border-radius:30px; background:linear-gradient(135deg,#c0186a,#7b2d8b); color:#fff; cursor:pointer; }
    #version { position:absolute; bottom:8px; right:12px; color:rgba(255,255,255,0.3); font-family:monospace; font-size:11px; pointer-events:none; }
  </style>
</head>
<body>
  <div id="version">v72</div>
  <div id="hud">
    <div id="score-box">⭐ <span id="score">1000</span> pts</div>
    <div id="timer-box">⏱️ <span id="timer">0:00</span></div>
    <div id="info-box">🖱️ Click+arrastrar: mirar | WASD: mover | Q/E: girar</div>
  </div>
  <div id="penalty">-25</div>
  <div id="finish-screen">
    <h1>🏆 ¡Llegaste a la meta!</h1>
    <div class="sub" id="finish-time"></div>
    <div class="sub" id="finish-points"></div>
    <div class="sub" id="finish-bonus"></div>
    <div class="final-score" id="finish-final"></div>
    <button onclick="location.reload()">🔁 Jugar de nuevo</button>
  </div>
  <button id="vr-btn" style="position:absolute;bottom:24px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#c0186a,#7b2d8b);color:#fff;border:none;padding:14px 32px;font-size:16px;border-radius:30px;cursor:pointer;">Entrar en VR</button>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { VRButton } from 'three/addons/webxr/VRButton.js';

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x3a2060, 0.004);

    const renderer = new THREE.WebGLRenderer({ antialias:true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(innerWidth, innerHeight);
    renderer.xr.enabled = true;
    renderer.shadowMap.enabled = true;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.9;
    document.body.appendChild(renderer.domElement);
    const vrBtn = VRButton.createButton(renderer);
    vrBtn.style.display = 'none';
    document.body.appendChild(vrBtn);
    document.getElementById('vr-btn').addEventListener('click', ()=>vrBtn.click());

    // CAMERA + RIG
    const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);
    const rig = new THREE.Group();
    rig.add(camera);
    rig.position.set(0, 2, 20);
    scene.add(rig);

    // KAYAK GROUP — todo declarado en el scope principal
    const kayakGroup = new THREE.Group();
    kayakGroup.position.set(0, -0.5, -1.0);
    rig.add(kayakGroup);

    const remoWrapper = new THREE.Group();
    remoWrapper.position.set(0, 0.2, -0.8);
    kayakGroup.add(remoWrapper);

    let remoMesh = null; // se asigna cuando carga el GLB

    // LUCES
    scene.add(new THREE.AmbientLight(0xffccee, 1.2));
    const sunL = new THREE.DirectionalLight(0xffaa66, 1.8);
    sunL.position.set(-80, 18, -300);
    sunL.castShadow = true;
    scene.add(sunL);

    // CURVA PISTA
    const curvePts = [
      new THREE.Vector3(  0,0,  30), new THREE.Vector3(  8,0,   0),
      new THREE.Vector3( -6,0, -40), new THREE.Vector3( 10,0, -80),
      new THREE.Vector3( -8,0,-120), new THREE.Vector3(  4,0,-160),
      new THREE.Vector3(-10,0,-200), new THREE.Vector3(  6,0,-240),
      new THREE.Vector3( -4,0,-280), new THREE.Vector3(  8,0,-320),
      new THREE.Vector3( -6,0,-360), new THREE.Vector3(  0,0,-400),
    ];
    const trackCurve = new THREE.CatmullRomCurve3(curvePts);
    const GATE_COUNT = 40, GATE_WIDTH = 6;

    // POSICIONES BOYAS
    const boyaPosL = [], boyaPosR = [];
    for(let i=0; i<GATE_COUNT; i++){
      const t = i/(GATE_COUNT-1);
      const pt  = trackCurve.getPoint(t);
      const tan = trackCurve.getTangent(t);
      const perp = new THREE.Vector3(-tan.z,0,tan.x).normalize();
      boyaPosL.push(pt.clone().addScaledVector(perp,  GATE_WIDTH));
      boyaPosR.push(pt.clone().addScaledVector(perp, -GATE_WIDTH));
    }

    // RÍO
    const river = new THREE.Mesh(
      new THREE.PlaneGeometry(300,1200,40,40),
      new THREE.MeshStandardMaterial({ color:0x6aa0b8, roughness:0.15, metalness:0.5, transparent:true, opacity:0.9 })
    );
    river.rotation.x = -Math.PI/2;
    river.position.set(0, -0.1, -400);
    scene.add(river);

    // ORILLAS
    const bkMat = new THREE.MeshStandardMaterial({ color:0x6b8c3a, roughness:0.9 });
    const bkR = new THREE.Mesh(new THREE.BoxGeometry(80,1.5,1200), bkMat); bkR.position.set( 190,-0.5,-400); scene.add(bkR);
    const bkL = new THREE.Mesh(new THREE.BoxGeometry(80,1.5,1200), bkMat); bkL.position.set(-190,-0.5,-400); scene.add(bkL);

    // PUENTE
    const BRIDGE_Z = -120;
    const stMat = new THREE.MeshStandardMaterial({color:0xbbbbbb,roughness:0.5,metalness:0.5});
    const cbMat = new THREE.MeshStandardMaterial({color:0xaaaaaa,roughness:0.3,metalness:0.7});
    const dk = new THREE.Mesh(new THREE.BoxGeometry(400,0.6,14), new THREE.MeshStandardMaterial({color:0x555555}));
    dk.position.set(0,12,BRIDGE_Z); scene.add(dk);
    [-6.5,6.5].forEach(z=>{ const r=new THREE.Mesh(new THREE.BoxGeometry(400,0.3,0.3),stMat); r.position.set(0,12.6,BRIDGE_Z+z); scene.add(r); });
    [-70,70].forEach(x=>{
      const tw=new THREE.Mesh(new THREE.BoxGeometry(3,45,3),stMat); tw.position.set(x,22,BRIDGE_Z); scene.add(tw);
      const bs=new THREE.Mesh(new THREE.CylinderGeometry(4,5,6,8),stMat); bs.position.set(x,-2,BRIDGE_Z); scene.add(bs);
      const top=new THREE.Vector3(x,44,BRIDGE_Z);
      [-35,-18,0,18,35].forEach(dx=>{
        const anc=new THREE.Vector3(x+(x>0?dx:-dx),12.3,BRIDGE_Z);
        const dir=new THREE.Vector3().subVectors(anc,top);
        const mid=new THREE.Vector3().addVectors(top,anc).multiplyScalar(0.5);
        const cab=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.06,dir.length(),4),cbMat);
        cab.position.copy(mid);
        cab.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir.clone().normalize());
        scene.add(cab);
      });
    });
    for(let x=-190;x<=190;x+=30){
      if(Math.abs(x)===70) continue;
      const pl=new THREE.Mesh(new THREE.CylinderGeometry(1,1.3,14,8),stMat); pl.position.set(x,5.7,BRIDGE_Z); scene.add(pl);
    }



    // BARCOS
    function makeBarco(x,z,largo,ancho,color){
      const g=new THREE.Group();
      const casco=new THREE.Mesh(new THREE.BoxGeometry(largo,3,ancho),new THREE.MeshStandardMaterial({color,roughness:0.7}));
      casco.position.y=0.5; g.add(casco);
      const cab=new THREE.Mesh(new THREE.BoxGeometry(largo*0.22,5,ancho*0.7),new THREE.MeshStandardMaterial({color:0xddddcc}));
      cab.position.set(-largo*0.28,4.5,0); g.add(cab);
      [0,1,2].forEach(i=>{ const c=new THREE.Mesh(new THREE.BoxGeometry(largo*0.18,3.5,ancho*0.55),new THREE.MeshStandardMaterial({color:[0xcc3322,0x2255aa,0x228833][i]})); c.position.set(-largo*0.05+i*largo*0.18,3.8,0); g.add(c); });
      g.position.set(x,-1,z); return g;
    }
    scene.add(makeBarco(-200,-60,55,14,0x334455));
    scene.add(makeBarco(-220,-200,65,16,0x445533));
    scene.add(makeBarco(-210,-340,50,12,0x554433));

    // META
    const metaPt  = trackCurve.getPoint(1);
    const metaTan = trackCurve.getTangent(1);
    const metaPerp = new THREE.Vector3(-metaTan.z,0,metaTan.x).normalize();
    const metaPostMat = new THREE.MeshStandardMaterial({color:0xffee00,emissive:0xffee00,emissiveIntensity:0.8});
    const metaL = new THREE.Mesh(new THREE.BoxGeometry(0.3,6,0.3),metaPostMat); metaL.position.set(metaPt.x+metaPerp.x*(GATE_WIDTH+1),3,metaPt.z); scene.add(metaL);
    const metaR = metaL.clone(); metaR.position.set(metaPt.x-metaPerp.x*(GATE_WIDTH+1),3,metaPt.z); scene.add(metaR);
    const banCv=document.createElement('canvas'); banCv.width=512; banCv.height=128;
    const bCtx2=banCv.getContext('2d');
    const bg2=bCtx2.createLinearGradient(0,0,512,0); bg2.addColorStop(0,'#c0186a'); bg2.addColorStop(0.5,'#7b2d8b'); bg2.addColorStop(1,'#e8521a');
    bCtx2.fillStyle=bg2; bCtx2.fillRect(0,0,512,128); bCtx2.fillStyle='#ffee00'; bCtx2.font='bold 56px Arial'; bCtx2.textAlign='center'; bCtx2.fillText('🏁 META',256,80);
    const metaBanner=new THREE.Mesh(new THREE.PlaneGeometry(GATE_WIDTH*2+2,1.5),new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(banCv),transparent:true,side:THREE.DoubleSide}));
    metaBanner.position.set(metaPt.x,5.5,metaPt.z); metaBanner.rotation.y=Math.atan2(metaTan.x,metaTan.z); scene.add(metaBanner);

    // CAPIBARA
    const capiTex=new THREE.TextureLoader().load('assets/sprites/016_Canotaje_Capibara_v06.png');
    const capiMesh=new THREE.Mesh(new THREE.PlaneGeometry(4,4),new THREE.MeshStandardMaterial({map:capiTex,transparent:true,depthWrite:false,side:THREE.DoubleSide,roughness:0.8}));
    capiMesh.position.set(12,2,-10); scene.add(capiMesh);

    // GLOBO
    const bCv=document.createElement('canvas'); bCv.width=512; bCv.height=256;
    const bCtx=bCv.getContext('2d');
    function drawBubble(text){
      bCtx.clearRect(0,0,512,256);
      bCtx.fillStyle='rgba(255,255,255,0.92)'; bCtx.beginPath(); bCtx.roundRect(10,10,492,190,24); bCtx.fill();
      bCtx.strokeStyle='#c0186a'; bCtx.lineWidth=4; bCtx.beginPath(); bCtx.roundRect(10,10,492,190,24); bCtx.stroke();
      bCtx.fillStyle='rgba(255,255,255,0.92)'; bCtx.beginPath(); bCtx.moveTo(220,196); bCtx.lineTo(256,246); bCtx.lineTo(292,196); bCtx.fill();
      bCtx.strokeStyle='#c0186a'; bCtx.lineWidth=4; bCtx.beginPath(); bCtx.moveTo(222,196); bCtx.lineTo(256,244); bCtx.lineTo(290,196); bCtx.stroke();
      bCtx.fillStyle='#3a003a'; bCtx.font='bold 26px Arial'; bCtx.textAlign='center';
      const words=text.split(' '); let line='',y=65;
      for(const w of words){ const tst=line+w+' '; if(bCtx.measureText(tst).width>440&&line){ bCtx.fillText(line.trim(),256,y); line=w+' '; y+=36; } else line=tst; }
      bCtx.fillText(line.trim(),256,y);
    }
    drawBubble('¡Seguí la pista! ¡Pasá entre las boyas!');
    const bubbleTex=new THREE.CanvasTexture(bCv);
    const bubble=new THREE.Mesh(new THREE.PlaneGeometry(3,1.5),new THREE.MeshBasicMaterial({map:bubbleTex,transparent:true,depthWrite:false,side:THREE.DoubleSide}));
    bubble.visible=false; scene.add(bubble);

    // CARTEL
    const c2d=document.createElement('canvas'); c2d.width=512; c2d.height=128;
    const ctx=c2d.getContext('2d');
    const gr=ctx.createLinearGradient(0,0,512,0); gr.addColorStop(0,'#c0186a'); gr.addColorStop(0.5,'#7b2d8b'); gr.addColorStop(1,'#e8521a');
    ctx.fillStyle=gr; ctx.roundRect(0,0,512,128,20); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 28px Arial'; ctx.textAlign='center';
    ctx.fillText('JUEGOS SURAMERICANOS',256,50); ctx.font='bold 22px Arial'; ctx.fillText('SANTA FE 2026',256,90);
    const sign=new THREE.Mesh(new THREE.PlaneGeometry(5,1.25),new THREE.MeshBasicMaterial({map:new THREE.CanvasTexture(c2d),transparent:true}));
    sign.position.set(0,5,10); scene.add(sign);

    // INPUT
    const keys={};
    window.addEventListener('keydown',e=>keys[e.code]=true);
    window.addEventListener('keyup',  e=>keys[e.code]=false);
    let drag=false,lx=0,ly=0,camYaw=0,camPitch=0;
    renderer.domElement.addEventListener('mousedown',e=>{ drag=true; lx=e.clientX; ly=e.clientY; });
    window.addEventListener('mouseup',()=>drag=false);
    window.addEventListener('mousemove',e=>{
      if(!drag||renderer.xr.isPresenting) return;
      camYaw-=(e.clientX-lx)*0.003; camPitch-=(e.clientY-ly)*0.003;
      camPitch=Math.max(-Math.PI/3,Math.min(Math.PI/3,camPitch));
      lx=e.clientX; ly=e.clientY;
      camera.rotation.order='YXZ'; camera.rotation.y=camYaw; camera.rotation.x=camPitch;
    });
    const input={moveX:0,moveZ:0,turnX:0};

    // SCORING
    let score=1000, penaltyCooldown=0, wasOutside=false, raceTime=0, raceFinished=false;
    const scoreEl=document.getElementById('score');
    const timerEl=document.getElementById('timer');
    const penaltyEl=document.getElementById('penalty');
    const finishScreen=document.getElementById('finish-screen');
    function showPenalty(){ penaltyEl.style.opacity='1'; setTimeout(()=>penaltyEl.style.opacity='0',700); }
    function formatTime(s){ const m=Math.floor(s/60),sec=Math.floor(s%60); return `${m}:${sec.toString().padStart(2,'0')}`; }
    function triggerFinish(){
      raceFinished=true;
      const timeBonus=Math.max(0,Math.round(500-raceTime*5));
      const finalScore=score+timeBonus;
      document.getElementById('finish-time').textContent=`⏱️ Tiempo: ${formatTime(raceTime)}`;
      document.getElementById('finish-points').textContent=`⭐ Puntos: ${score}`;
      document.getElementById('finish-bonus').textContent=`🚀 Bonus: +${timeBonus}`;
      document.getElementById('finish-final').textContent=`TOTAL: ${finalScore} pts`;
      finishScreen.style.display='flex';
      drawBubble('¡Felicitaciones! ¡Llegaste a la meta! 🏆');
      bubbleTex.needsUpdate=true;
      capiMesh.position.set(metaPt.x+3,2,metaPt.z);
      bubble.visible=true;
      bubble.position.set(metaPt.x+3,5.5,metaPt.z);
    }
    function closestPointOnCurve(px,pz){
      let bestDist=Infinity,bestPt=null;
      for(let i=0;i<=120;i++){ const pt=trackCurve.getPoint(i/120); const d=(px-pt.x)**2+(pz-pt.z)**2; if(d<bestDist){bestDist=d;bestPt=pt;} }
      return bestPt;
    }

    // GLB LOADER — todo en un solo async
    (async()=>{
      try {
        const { GLTFLoader } = await import('three/addons/loaders/GLTFLoader.js');
        const loader = new GLTFLoader();
        loader.setRequestHeader({});

        // HDRI
        try {
          const { RGBELoader } = await import('three/addons/loaders/RGBELoader.js');
          const rgbe = new RGBELoader();
          rgbe.setDataType(THREE.HalfFloatType);
          rgbe.load('assets/hdris/table_mountain_2_puresky_2k.hdr', tex=>{
            tex.mapping=THREE.EquirectangularReflectionMapping;
            scene.background=tex;
            console.log('HDRI ✓');
          }, undefined, err=>console.warn('HDRI err:',err));
        } catch(e){ console.warn('RGBELoader:',e); }

        // KAYAK — valores exactos del usuario
        loader.load('assets/models/Kayak.glb', gltf=>{
          const k=gltf.scene;
          k.scale.set(3,3,3);
          k.rotation.set(0,Math.PI/2,0);
          k.position.set(0,-0.9,2);
          k.traverse(n=>{ if(n.isMesh){ n.castShadow=true; n.material=n.material.clone(); n.material.color.setHex(0x7b2d8b); n.material.emissive=new THREE.Color(0x2a0a30); n.material.emissiveIntensity=0.15; } });
          kayakGroup.add(k);
          console.log('Kayak ✓');
        }, undefined, err=>console.warn('Kayak err:',err));

        // REMO — va al remoWrapper
        loader.load('assets/models/Remo.glb', gltf=>{
          remoMesh=gltf.scene;
          remoMesh.scale.set(2.2, 2.2, 2.2);
          remoMesh.rotation.set(0, 0, 0);
          remoMesh.traverse(n=>{ if(n.isMesh){ n.castShadow=true; n.material=n.material.clone(); n.material.color.setHex(0xc0186a); n.material.emissive=new THREE.Color(0x3a0020); n.material.emissiveIntensity=0.15; } });
          remoWrapper.add(remoMesh);
          console.log('Remo ✓');
        }, undefined, err=>console.warn('Remo err:',err));

        // BOYAS INFLABLES
        loader.load('assets/models/inflatable_buoy.glb', gltf=>{
          const tmpl=gltf.scene;
          boyaPosL.forEach(p=>{ const b=tmpl.clone(); b.scale.set(1,1,1); b.position.set(p.x,0,p.z); b.traverse(n=>{ if(n.isMesh){ n.material=n.material.clone(); n.material.color.setHex(0xc0186a); } }); scene.add(b); });
          boyaPosR.forEach(p=>{ const b=tmpl.clone(); b.scale.set(1,1,1); b.position.set(p.x,0,p.z); b.traverse(n=>{ if(n.isMesh){ n.material=n.material.clone(); n.material.color.setHex(0x7b2d8b); } }); scene.add(b); });
          console.log('Boyas ✓');
        }, undefined, err=>{
          console.warn('Boyas fallback:',err);
          boyaPosL.forEach(p=>{ const b=new THREE.Mesh(new THREE.SphereGeometry(0.4,8,8),new THREE.MeshStandardMaterial({color:0xc0186a})); b.position.set(p.x,0.4,p.z); scene.add(b); });
          boyaPosR.forEach(p=>{ const b=new THREE.Mesh(new THREE.SphereGeometry(0.4,8,8),new THREE.MeshStandardMaterial({color:0x7b2d8b})); b.position.set(p.x,0.4,p.z); scene.add(b); });
        });

        // BUILDINGS GLB — intercalados aleatoriamente a la izquierda
        const buildingUrls = [
          'assets/models/building_01.glb',
          'assets/models/building_02.glb',
          'assets/models/building_03.glb',
        ];
        // Posiciones de la ciudad — dos filas a la izquierda
        const cityPositions = [];
        for(let z=-10; z>-390; z-=35){
          cityPositions.push([-230 + Math.random()*8, z + Math.random()*8]);
          cityPositions.push([-265 + Math.random()*8, z + Math.random()*8]);
          cityPositions.push([-300 + Math.random()*8, z + Math.random()*8]);
        }
        // Cargamos los 3 templates y luego los distribuimos
        const bldTemplates = [];
        let bldLoaded = 0;
        buildingUrls.forEach((url, idx)=>{
          loader.load(url, gltf=>{
            bldTemplates[idx] = gltf.scene;
            bldLoaded++;
            if(bldLoaded === 3){
              // Todos cargados — distribuir
              cityPositions.forEach(([x, z])=>{
                const tmpl = bldTemplates[Math.floor(Math.random()*3)];
                const b = tmpl.clone();
                const s = 0.08 + Math.random()*0.04;
                b.scale.set(s, s, s);
                b.position.set(x, 0, z);
                b.rotation.y = Math.random()*Math.PI*0.5;
                b.traverse(n=>{ if(n.isMesh){ n.castShadow=true; n.receiveShadow=true; } });
                scene.add(b);
              });
              console.log('Buildings ✓');
            }
          }, undefined, err=>console.warn(`Building ${idx+1} err:`, err));
        });
        const treePts=[];
        for(let z=10;z>-780;z-=18){ treePts.push([155+Math.random()*10,0,z+Math.random()*6]); treePts.push([168+Math.random()*10,0,z+Math.random()*6]); }
        loader.load('assets/models/arbol 01.glb', gltf=>{
          treePts.forEach(([x,y,z])=>{ const tr=gltf.scene.clone(),s=3+Math.random()*2; tr.scale.set(s,s,s); tr.position.set(x,y,z); tr.rotation.y=Math.random()*Math.PI*2; scene.add(tr); });
          console.log('Árboles ✓');
        }, undefined, err=>console.warn('Árboles err:',err));

      } catch(e){ console.warn('GLTFLoader no disponible:',e); }
    })();

    // LOOP
    const clock=new THREE.Clock();
    let t=0, remoT=0;

    renderer.setAnimationLoop(()=>{
      const dt=clock.getDelta(); t+=dt;
      if(!raceFinished) raceTime+=dt;
      penaltyCooldown=Math.max(0,penaltyCooldown-dt);
      timerEl.textContent=formatTime(raceTime);

      if(renderer.xr.isPresenting){
        for(const src of renderer.xr.getSession().inputSources){
          const gp=src.gamepad; if(!gp) continue;
          if(src.handedness==='left'){ input.moveX=Math.abs(gp.axes[2])>0.15?gp.axes[2]:0; input.moveZ=Math.abs(gp.axes[3])>0.15?gp.axes[3]:0; }
          else input.turnX=Math.abs(gp.axes[2])>0.15?gp.axes[2]:0;
        }
      }
      input.moveZ=keys['KeyW']||keys['ArrowUp']?-1:keys['KeyS']||keys['ArrowDown']?1:renderer.xr.isPresenting?input.moveZ:0;
      input.moveX=keys['KeyA']||keys['ArrowLeft']?-1:keys['KeyD']||keys['ArrowRight']?1:renderer.xr.isPresenting?input.moveX:0;
      input.turnX=keys['KeyQ']?-1:keys['KeyE']?1:renderer.xr.isPresenting?input.turnX:0;

      const yaw=rig.rotation.y;
      rig.position.x+=(Math.cos(yaw)*input.moveX-Math.sin(yaw)*input.moveZ)*8*dt;
      rig.position.z+=(Math.sin(yaw)*input.moveX+Math.cos(yaw)*input.moveZ)*8*dt;
      rig.rotation.y-=input.turnX*1.5*dt;

      // Animación remo — solo el wrapper, el mesh queda intacto
      const moving=input.moveZ!==0||input.moveX!==0;
      if(moving) remoT+=dt*2.5;
      remoWrapper.rotation.x=Math.sin(remoT)*0.3;
      remoWrapper.rotation.y=Math.sin(remoT)*0.18;
      remoWrapper.position.y=-0.3+Math.sin(remoT)*0.06;
      kayakGroup.rotation.z=Math.sin(remoT)*(moving?0.02:0);

      river.position.y=-0.1+Math.sin(t*0.4)*0.04;

      if(!raceFinished&&rig.position.z<metaPt.z+3&&rig.position.z>metaPt.z-3) triggerFinish();

      const px=rig.position.x,pz=rig.position.z;
      if(pz<25&&pz>-410){
        const cp=closestPointOnCurve(px,pz);
        const dist=Math.sqrt((px-cp.x)**2+(pz-cp.z)**2);
        const isOutside=dist>GATE_WIDTH+1.5;
        if(isOutside&&!wasOutside&&penaltyCooldown<=0){ score=Math.max(0,score-25); scoreEl.textContent=score; showPenalty(); penaltyCooldown=2.0; }
        wasOutside=isOutside;
      }

      capiMesh.position.y=2+Math.sin(t*1.2)*0.15;
      capiMesh.lookAt(rig.position.x,capiMesh.position.y,rig.position.z);

      const dCapi=rig.position.distanceTo(capiMesh.position);
      if(dCapi<8){
        bubble.visible=true;
        bubble.position.set(capiMesh.position.x,capiMesh.position.y+3.2,capiMesh.position.z);
        bubble.lookAt(rig.position.x,bubble.position.y,rig.position.z);
        bubble.material.opacity=Math.min(1,(8-dCapi)/3);
      } else bubble.visible=false;

      sign.lookAt(rig.position.x,sign.position.y,rig.position.z);
      renderer.render(scene,camera);
    });

    window.addEventListener('resize',()=>{
      camera.aspect=innerWidth/innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth,innerHeight);
    });
  </script>
</body>
</html>
